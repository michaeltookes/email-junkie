name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Least-privilege token: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    name: Build, Test & Lint
    runs-on: macos-15
    timeout-minutes: 20
    defaults:
      run:
        working-directory: EmailJunkie
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint --version
          swiftlint lint --strict

      - name: Test mail package
        working-directory: ${{ github.workspace }}
        run: |
          cd Packages/EmailJunkieMail
          swift test

      - name: Build & Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project EmailJunkie.xcodeproj \
            -scheme EmailJunkie \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
