# SwiftLint configuration for Email Junkie

excluded:
  - DerivedData
  - .build
  - build

disabled_rules:
  - todo  # TODOs are fine during development

opt_in_rules:
  - empty_count
  - closure_spacing

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - x
    - y
    - id
    - to

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true

large_tuple:
  warning: 4
  error: 5

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 60
  error: 100

nesting:
  type_level: 2
  function_level: 3
